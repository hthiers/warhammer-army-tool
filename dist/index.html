]},"escudo-emperador":{nombre:"Ira de Dorn",efectos:["Siempre que una miniatura con Juramento y Órdenes ataque al blanco de Juramento: puede repetir tiradas para herir de 1.","Siempre que una miniatura de unidad DARNATH LYSANDER ataque al blanco de Juramento: puede repetir todas las tiradas para herir."]},"espolon-marca-sombria":{nombre:"Señores de las sombras",efectos:['Siempre que un ataque a distancia tome como blanco una unidad ADEPTUS ASTARTES, si el atacante está a más de 12": el blanco se beneficia de cobertura.','Táctico sin igual: 1 vez por ronda, si AETHON SHAAN está en campo, puedes usar la estratagema "A la oscuridad" por 0 PM.']},"contingente-bastion":{nombre:"Tácticas interconectadas",efectos:["Las unidades LÍNEA DE BATALLA ADEPTUS ASTARTES pueden elegirse para disparar y declarar carga en turno en que avanzaron o retrocedieron, y pueden empezar a realizar una acción en turno en que avanzaron o retrocedieron.","Cuando una unidad LÍNEA DE BATALLA ADEPTUS ASTARTES ataca, tras resolver sus ataques, elige 1 unidad enemiga en que haya impactado: queda escaneada con áuspex hasta el final del turno.","Siempre que una miniatura ADEPTUS ASTARTES ataque a una unidad escaneada con áuspex: repite tiradas para impactar de 1."]},"fuerza-asalto-orbital":{nombre:"Despliegue en descenso rápido",efectos:["Al inicio del paso de declarar formaciones, elige N unidades ADEPTUS ASTARTES no TITÁNICA que tendrán Despliegue rápido: Incursión=2, Fuerza de choque=3, Conquista=4.","Siempre que una miniatura ADEPTUS ASTARTES ataque y se desplegó en campo este turno: repite tiradas para herir de 1. Si además desembarcó de una CÁPSULA DE DESEMBARCO este turno: repite también tiradas para impactar de 1."]},"fuerza-recuperacion":{nombre:"Juramento de la recuperación",efectos:["Siempre que una miniatura ADEPTUS ASTARTES realice un ataque de combate que tome como blanco una unidad dentro del alcance de un marcador de objetivo: mejora en 1 el FP de ese ataque.","Siempre que un ataque tome como blanco una unidad ADEPTUS ASTARTES de tu ejército, si tu unidad controla un marcador de objetivo al inicio de la fase Y la Fuerza del ataque supera la Resistencia de tu unidad (o la unidad tiene clave TITUS): resta 1 a las tiradas para herir."]},"martillo-avernii":{nombre:"Aniquilación Calculada",efectos:["Siempre que una miniatura de tu ejército con la habilidad Juramento y órdenes realice un ataque que tome como blanco tu blanco de Juramento y órdenes, puedes repetir las tiradas para herir de 1.","Recalcular: 1 vez por ronda, tras eliminar tu blanco de Juramento y órdenes, si una miniatura CAANOK VAR de tu ejército está en campo, elige una unidad enemiga visible para esa miniatura. Esa unidad se convierte en el nuevo blanco de Juramento y órdenes.","Tu ejército puede incluir unidades MANOS DE HIERRO pero no puede incluir unidades ADEPTUS ASTARTES de otros Capítulos."]},"contingente-punta-lanza":{nombre:"Matanza Arrolladora",efectos:["Las unidades ADEPTUS ASTARTES de tu ejército pueden elegirse para declarar una carga en un turno en el que hayan avanzado o retrocedido.",'Ira del Primer Khan: Al final de la fase de combate, si una unidad SUBODEN KHAN de tu ejército eliminó una o más unidades enemigas durante esta fase y no se encuentra en la zona de amenaza de ninguna unidad enemiga, esa unidad puede hacer un movimiento Normal de hasta 6".',"Tu ejército puede incluir unidades CICATRICES BLANCAS pero no puede incluir unidades ADEPTUS ASTARTES de otros Capítulos."]}},pm={"centinelas-ceramita":[{id:"honor-infatigable",nombre:"Honor infatigable",restriccion:"ADEPTUS ASTARTES",desc:"1ª vez que se elimine al portador: tira 1D6 al final de la fase; con 2+ se despliega de nuevo con todas sus heridas iniciales, fuera de zona de amenaza enemiga."},{id:"vocosistema-castellum",nombre:"Vocosistema Castellum",restriccion:"ADEPTUS ASTARTES",desc:"Cuando la unidad retrocede, elige: (a) puede realizar acciones en turno en que retrocedió, o (b) puede disparar y declarar cargas
