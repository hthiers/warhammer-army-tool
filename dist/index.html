ion":{nombre:"Tácticas interconectadas",efectos:["Las unidades LÍNEA DE BATALLA ADEPTUS ASTARTES pueden elegirse para disparar y declarar carga en turno en que avanzaron o retrocedieron, y pueden empezar a realizar una acción en turno en que avanzaron o retrocedieron.","Cuando una unidad LÍNEA DE BATALLA ADEPTUS ASTARTES ataca, tras resolver sus ataques, elige 1 unidad enemiga en que haya impactado: queda escaneada con áuspex hasta el final del turno.","Siempre que una miniatura ADEPTUS ASTARTES ataque a una unidad escaneada con áuspex: repite tiradas para impactar de 1."]},"fuerza-asalto-orbital":{nombre:"Despliegue en descenso rápido",efectos:["Al inicio del paso de declarar formaciones, elige N unidades ADEPTUS ASTARTES no TITÁNICA que tendrán Despliegue rápido: Incursión=2, Fuerza de choque=3, Conquista=4.","Siempre que una miniatura ADEPTUS ASTARTES ataque y se desplegó en campo este turno: repite tiradas para herir de 1. Si además desembarcó de una CÁPSULA DE DESEMBARCO este turno: repite también tiradas para impactar de 1."]},"fuerza-recuperacion":{nombre:"Juramento de la recuperación",efectos:["Siempre que una miniatura ADEPTUS ASTARTES realice un ataque de combate que tome como blanco una unidad dentro del alcance de un marcador de objetivo: mejora en 1 el FP de ese ataque.","Siempre que un ataque tome como blanco una unidad ADEPTUS ASTARTES de tu ejército, si tu unidad controla un marcador de objetivo al inicio de la fase Y la Fuerza del ataque supera la Resistencia de tu unidad (o la unidad tiene clave TITUS): resta 1 a las tiradas para herir."]}},np={"centinelas-ceramita":[{id:"honor-infatigable",nombre:"Honor infatigable",restriccion:"ADEPTUS ASTARTES",desc:"1ª vez que se elimine al portador: tira 1D6 al final de la fase; con 2+ se despliega de nuevo con todas sus heridas iniciales, fuera de zona de amenaza enemiga."},{id:"vocosistema-castellum",nombre:"Vocosistema Castellum",restriccion:"ADEPTUS ASTARTES",desc:"Cuando la unidad retrocede, elige: (a) puede realizar acciones en turno en que retrocedió, o (b) puede disparar y declarar cargas en turno en que retrocedió."},{id:"datacraneo-espia",nombre:"Datacráneo espía",restriccion:"ADEPTUS ASTARTES",desc:"Las armas a distancia de las miniaturas de la unidad del portador tienen [IGNORA COBERTURA]."},{id:"maestria-defensiva",nombre:"Maestría defensiva",restriccion:"ADEPTUS ASTARTES",desc:"Tras el despliegue, elige hasta 3 unidades ADEPTUS ASTARTES y redespliégalas; puedes ponerlas en reserva estratégica sin importar cuántas haya ya."}],"filo-ultramar":[{id:"armadura-antoninus",nombre:"Armadura de Antoninus",restriccion:"ADEPTUS ASTARTES",desc:"El portador tiene Salvación 2+ y No hay dolor 5+."},{id:"juramento-macragge",nombre:"Juramento de Macragge",restriccion:"ADEPTUS ASTARTES",desc:"+1 Ataques y +1 Fuerza a armas de combate del portador. Con Doctrina de Asalto activa: +2 Ataques y +2 Fuerza en su lugar."},{id:"estudiante-codex",nombre:"Estudiante del Codex",restriccion:"ADEPTUS ASTARTES",desc:"Al inicio de tu fase de mando, si el portador está en campo: la Doctrina Táctica queda activa para esa unidad hasta la siguiente fase de mando (ignorando la doctrina activa del ejército)."},{id:"veterano-coloso",nombre:"Veterano del Coloso",restriccion:"ADEPTUS ASTARTES",desc:"Mientras el portador lidere una unidad: armas a distancia de esa unidad tienen [GOLPES SOSTENIDOS 1]. Con Doctrina Devastadora activa: puede repetir tiradas de avanzar de la unidad."}],"buscadores-padre-forjador":[{id:"inmolador",nombre:"Inmolador",restriccion:"ADEPTUS ASTARTES",desc:"+1 Ataques a las armas Ráfaga de las miniaturas de la unidad del portador."},{id:"artifice-curtido-guerra",nombre:"Artífice curtido en la guerra",restriccion:"INFANTERÍA ADEPTUS ASTARTES",desc:"+3 Fuerza a las armas de combate del portador."},{id:"forjado-batalla",nombre:"Forjado en batalla",restriccion:"ADEPTUS ASTARTES",desc:"Mientras el portador lidere una unidad: 1 vez por turno, tras una tirada para impactar o salvación de una miniatura de esa unidad, puedes cambiar el resultado a 6 sin modificar."},{id:"manto-adamantino",nombre:"Manto adamantino",restriccion:"ADEPTUS ASTARTES",desc:"Siempre que se asigne un ataque al portador: resta 1 al Daño de ese ataque. Si el arma es Fusión o Ráfaga, cambia el Daño a 1."}],"escudo-emperador":[{id:"campeon-suyos",nombre:"Campeón entre los suyos",restriccion:"ADEPTUS ASTARTES",desc:"+1 Ataques a armas de combate del portador. 1 vez por batalla, al inicio de cualquier fase: también +1 Ataques al resto de miniaturas de su unidad hasta el final de la fase."},{id:"discipulo-rhetoricus",nombre:"Discípulo de Rhetoricus",restriccion:"EXTERMINADOR ADEPTUS ASTARTES",desc:"+1 OC al portador. 1 vez por batalla, al inicio de cualquier fase: también +1 OC al resto de miniaturas de su unidad hasta el final de la fase."},{id:"campeon-indomable",nombre:"Campeón indomable",restriccion:"EXTERMINADOR ADEPTUS ASTARTES",desc:"1ª vez que se elimine al portador: tira 1D6 al final de la fase; con 2+ se despliega de nuevo con 3 heridas restantes, fuera de zona de amenaza enemiga."},{id:"estandarte-malodrax",nombre:"Estandarte de Malodrax",restriccion:"ANCIANO ADEPTUS ASTARTES",desc:"Siempre que un ataque tome como blanco la unidad del portador y Fuerza > Resistencia de la unidad: resta 1 a las tiradas para herir."}],"espolon-marca-sombria":[{id:"sudario-alanegra",nombre:"Sudario Alanegra",restriccion:"INFANTERÍA ADEPTUS ASTARTES",desc:"Mientras el portador lidere una unidad: las miniaturas de esa unidad tienen la habilidad Infiltradores."},{id:"coronario-susurrante",nombre:"Coronario susurrante",restriccion:"PHOBOS",desc:'Aura "Señor del engaño": cuando el oponente toma una unidad a 12" o menos del portador como blanco de una estratagema, aumenta en 1 PM el coste.'},{id:"rapaz-umbrio",nombre:"Rapaz umbrío",restriccion:"ADEPTUS ASTARTES",desc:"El portador tiene las habilidades Agente solitario y Sigilo."},{id:"instintos-cazador",nombre:"Instintos de cazador",restriccion:"ADEPTUS ASTARTES",desc:"Si la unidad del portador está en reservas estratégicas: a efectos de despliegue, trata el número de ronda actual como 1 más alto."}],"contingente-bastion":[{id:"ojo-primarca",nombre:"El Ojo del Primarca",restriccion:"ADEPTUS ASTARTES",desc:"Las armas a distancia del portador y de las miniaturas LÍNEA DE BATALLA de su unidad tienen [PRECISIÓN]."},{id:"heroe-capitulo",nombre:"Héroe del Capítulo",restriccion:"ADEPTUS ASTARTES",desc:"Mientras el portador lidere una unidad: el portador tiene la clave LÍNEA DE BATALLA."},{id:"filos-preciados",nombre:"Filos Preciados",restriccion:"ADEPTUS ASTARTES",desc:"+1 FP a armas de combate del portador y de las miniaturas LÍNEA DE BATALLA de su unidad."},{id:"comunicador-amplificado",nombre:"Comunicador Amplificado",restriccion:"ADEPTUS ASTARTES",desc:"Siempre que la unidad del portador sea blanco de una estratagema: tira 1D6 (+1 si tiene clave LÍNEA DE BATALLA); con 4+ ganas 1 PM."}],"fuerza-asalto-orbital":[{id:"laureles-trueno",nombre:"Laureles del Trueno",restriccion:"ADEPTUS ASTARTES",desc:"Puede repetir tiradas de carga de la unidad en turnos en que se despliegue en campo."},{id:"veterano-vanguardia",nombre:"Veterano de la Vanguardia",restriccion:"ADEPTUS ASTARTES",desc:'Las miniaturas de la unidad del portador tienen la habilidad Avanzadilla 6".'},{id:"relicario-enlace-orbital",nombre:"Relicario de enlace orbital",restriccion:"ADEPTUS ASTARTES",desc:"Tras el despliegue, elige hasta 3 unidades ADEPTUS ASTARTES y redespliégalas; puedes ponerlas en reserva estratégica sin límite."},{id:"canonera-asignada",nombre:"Cañonera asignada",restriccion:"EXTERMINADOR ADEPTUS ASTARTES",desc:"1 vez por batalla, al final de la fase de combate del oponente, si la unidad del portador no tiene enemigos en su zona de amenaza: retira la unidad del campo y colócala en reservas estratégicas."}],"fuerza-recuperacion":[{id:"sellos-reconquista",nombre:"Sellos de la Reconquista",restriccion:"ADEPTUS ASTARTES",desc:"Las miniaturas de la unidad del portador tienen salvación invulnerable de 5+."},{id:"avatar-vengativo",nombre:"Avatar Vengativo",restriccion:"ADEPTUS ASTARTES",desc:'Aura: en el paso de acobardamiento de la fase de mando del oponente, toda unidad enemiga por debajo de sus efectivos iniciales a 9" o menos del portador debe hacer un chequeo de acobardamiento.'},{id:"pergamino-proclamacion",nombre:"Pergamino de la Proclamación",restriccion:"ADEPTUS ASTARTES",desc:'Cuando la unidad declara una carga y hay una unidad enemiga a 12" dentro del alcance de un objetivo: puede repetir la tirada de carga, pero debe trabar con esa unidad enemiga.'},{id:"liberatum",nombre:"Liberatum",restriccion:"ADEPTUS ASTARTES",desc:"Siempre que el portador ataque a una unidad enemiga dentro del alcance de un marcador de objetivo: puede repetir cualquier tirada para impactar y para herir."}]},ap={"centinelas-ceramita":[{id:"poder-inquebrantable",nombre:"Poder inquebrantable",tipo:"Táctica de batalla",pm:1,cuando:"Fase de mando",blanco:"1 unidad ADEPTUS ASTARTES en zona de amenaza enemiga",efecto:"Hasta el inicio de la siguiente fase de mando: +1 OC a las miniaturas de tu unidad."},{id:"ataque-prioritario",nombre:"Ataque prioritario",tipo:"Táctica de batalla",pm:2,cuando:"Fase de disparo o combate",blanco:"1 unidad INFANTERÍA o MONTADA ADEPTUS ASTARTES no elegida para disparar/combatir en esta fase",efecto:"Hasta el final de la fase: siempre que una miniatura ataque a PERSONAJE, MONSTRUO o VEHÍCULO, puede repetir las tiradas para herir."},{id:"armadura-desprecio",nombre:"Armadura del desprecio",tipo:"Táctica de batalla",pm:1,cuando:"Fase de disparo del oponente o fase de combate, justo después de que una unidad enemiga elija sus blancos",blanco:"1 unidad ADEPTUS ASTARTES elegida como blanco",efecto:"Hasta que la unidad atacante acabe sus ataques: empeora en 1 el FP de cada ataque contra tu unidad."},{id:"resistir-hasta-el-final",nombre:"Resistir hasta el final",tipo:"Hazaña épica",pm:1,cuando:"Fase de combate, justo después de que una unidad enemiga elija sus blancos",blanco:"1 unidad ADEPTUS ASTARTES elegida como blanco",efecto:"Hasta el final de la fase: cuando se elimine una miniatura de tu unidad que aún no ha combatido, tira 1D6 (+1 si ATRINCHERADA); con 4+ no se retira aún, combate tras la unidad atacante y luego se retira."},{id:"punteria-mejorada",nombre:"Puntería mejorada",tipo:"Táctica de batalla",pm:1,cuando:"Fase de disparo",blanco:"1 unidad ADEPTUS ASTARTES no elegida para disparar en esta fase",efecto:"Elige [GOLPES SOSTENIDOS 1] o [IMPACTOS LETALES]. Hasta el final de la fase, las armas a distancia de tu unidad tienen esa habilidad. Si la unidad está ATRINCHERADA, tienen ambas."},{id:"reposicionamiento-evasivo",nombre:"Reposicionamiento evasivo",tipo:"Ardid estratégico",pm:1,cuando:"Fase de disparo del oponente, justo después de que una unidad enemiga dispare",blanco:"1 unidad INFANTERÍA o MONTADA ADEPTUS ASTARTES elegida como blanco de esos ataques",efecto:'Tu unidad puede hacer un movimiento normal de hasta 1D6". Si está ATRINCHERADA, puedes repetir ese 1D6.'}],"filo-ultramar":[{id:"armadura-desprecio",nombre:"Armadura del desprecio",tipo:"Táctica de batalla",pm:1,cuando:"Fase de disparo del oponente o fase de combate, justo después de que una unidad enemiga elija sus blancos",blanco:"1 unidad ADEPTUS ASTARTES elegida como blanco",efecto:"Hasta que la unidad atacante acabe sus ataques: empeora en 1 el FP de cada ataque contra tu unidad."},{id:"clarividencia-tactica",nombre:"Clarividencia táctica",tipo:"Hazaña épica",pm:1,cuando:"Fase de disparo del oponente o fase de combate, justo después de que una unidad enemiga elija sus blancos",blanco:"1 unidad ADEPTUS ASTARTES elegida como blanco",efecto:"Hasta el final de la fase: siempre que un ataque tome tu unidad como blanco, si Fuerza ≥ Resistencia de tu unidad, resta 1 a las tiradas para herir."},{id:"coraje-y-honor",nombre:"Coraje y honor",tipo:"Táctica de batalla",pm:1,cuando:"Fase de combate",blanco:"1 unidad ADEPTUS ASTARTES",efecto:"Hasta el final de la fase: las armas de combate de tu unidad tienen [LANZA]. Si la unidad está bajo Doctrina de Asalto: además mejora en 1 el FP de esas armas."},{id:"adaptividad-ultramar",nombre:"Adaptividad de Ultramar",tipo:"Ardid estratégico",pm:1,cuando:"Fase de mando",blanco:"1 unidad ADEPTUS ASTARTES",efecto:"Selecciona Doctrina Devastadora, Táctica o de Asalto. Hasta el inicio de la siguiente fase de mando, esa doctrina está activa para tu unidad (incluso si ya se usó en esta batalla o no hay otra activa)."},{id:"ejemplar-ojo-avizor",nombre:"Ejemplar ojo avizor",tipo:"Táctica de batalla",pm:1,cuando:"Fase de disparo",blanco:"1 unidad ADEPTUS ASTARTES no elegida para disparar en esta fase",efecto:"Las armas a distancia de tu unidad tienen [IGNORA COBERTURA]. Si la unidad está bajo Doctrina Devastadora: además mejora en 1 el FP de esas armas."},{id:"tacticas-practicas",nombre:"Tácticas prácticas",tipo:"Ardid estratégico",pm:1,cuando:"Fase de movimiento del oponente, justo después de que una unidad enemiga termine un movimiento normal, de avanzar o de retroceder",blanco:'1 unidad INFANTERÍA o MONTADA ADEPTUS ASTARTES sin enemigos en su zona de amenaza, a 9" de la unidad que acaba de mover',efecto:'Tu unidad puede hacer un movimiento normal de hasta 1D6", o hasta 6" si está bajo Doctrina Táctica.'}],"buscadores-padre-forjador":[{id:"armadura-desprecio",nombre:"Armadura del desprecio",tipo:"Táctica de batalla",pm:1,cuando:"Fase de disparo del oponente o fase de combate, justo después de que una unidad enemiga elija sus blancos",blanco:"1 unidad ADEPTUS ASTARTES elegida como blanco",efecto:"Hasta que la unidad atacante acabe sus ataques: empeora en 1 el FP de cada ataque contra tu unidad."},{id:"crisol-batalla",nombre:"Crisol de la batalla",tipo:"Táctica de batalla",pm:1,cuando:"Fase de disparo o fase de combate",blanco:"1 unidad INFANTERÍA ADEPTUS ASTARTES no elegida para disparar/combatir en esta fase",efecto:'Hasta el final de la fase: siempre que una miniatura ataque al blanco apto más cercano a 6" o menos, suma 1 a las tiradas para herir.'},{id:"infierno-iracundo",nombre:"Infierno iracundo",tipo:"Ardid estratégico",pm:1,cuando:"Fase de movimiento, justo después de que una unidad INFANTERÍA ADEPTUS ASTARTES retroceda",blanco:"Esa unidad",efecto:"Hasta el final del turno: la unidad puede elegirse para disparar en un turno en que haya retrocedido."},{id:"protocolos-inmolacion",nombre:"Protocolos de inmolación",tipo:"Táctica de batalla",pm:2,cuando:"Fase de disparo",blanco:"1 unidad ADEPTUS ASTARTES no elegida para disparar en esta fase",efecto:"Hasta el final de la fase: las armas de Ráfaga de las miniaturas de tu unidad tienen [HERIDAS DEVASTADORAS]."},{id:"venganza-ardiente",nombre:"Venganza ardiente",tipo:"Táctica de batalla",pm:1,cuando:"Fase de disparo del oponente, justo después de que una unidad enemiga dispare",blanco:"1 unidad TRANSPORTE ADEPTUS ASTARTES elegida como blanco de esos ataques",efecto:"1 unidad embarcada puede desembarcar como si fuera tu fase de movimiento y disparar como si fuera tu fase de disparo, pero solo contra esa unidad enemiga y solo si es blanco apto."},{id:"tierra-en-llamas",nombre:"Tierra en llamas",tipo:"Ardid estratégico",pm:1,cuando:"Inicio de la fase de carga del oponente",blanco:"1 unidad ADEPTUS ASTARTES equipada con algún arma Ráfaga",efecto:'Elige 1 unidad enemiga visible a 12" o menos (no MONSTRUO, ni VEHÍCULO, ni VOLAR). Hasta el final de la fase: si esa unidad declara una carga, resta 2 a la tirada de carga (no acumulable con otros modificadores negativos).'}],"escudo-emperador":[{id:"armadura-desprecio",nombre:"Armadura del desprecio",tipo:"Táctica de batalla",pm:1,cuando:"Fase de disparo del oponente o fase de combate, justo después de que una unidad enemiga elija sus blancos",blanco:"1 unidad ADEPTUS ASTARTES elegida como blanco",efecto:"Hasta que la unidad atacante acabe sus ataques: empeora en 1 el FP de cada ataque contra tu unidad."},{id:"furia-primera",nombre:"Furia de la Primera",tipo:"Táctica de batalla",pm:1,cuando:"Fase de disparo o fase de combate",blanco:"1 unidad EXTERMINADOR, ESC. VETERANOS DE FÉRREAGUARDIA, ESC. VETERANOS DE RETAGUARDIA o ESC. VETERANOS DE VANGUARDIA no elegida para disparar/combatir en esta fase",efecto:"Hasta el final de la fase: suma 1 a las tiradas para impactar. Si la unidad está por debajo de sus efectivos iniciales: también suma 1 a las tiradas para herir."},{id:"venganza-obstinada",nombre:"Venganza obstinada",tipo:"Táctica de batalla",pm:1,cuando:"Fase de combate, justo después de que una unidad enemiga elija sus blancos",blanco:"1 unidad EXTERMINADOR, ESC. VET. FÉRREAGUARDIA, ESC. VET. RETAGUARDIA o ESC. VET. VANGUARDIA elegida como blanco",efecto:"Hasta el final de la fase: cuando se elimine una miniatura de tu unidad que aún no ha combatido, tira 1D6; con 3+ puede combatir tras la unidad atacante y luego se retira."},{id:"conquistadores-iracundos",nombre:"Conquistadores iracundos",tipo:"Ardid estratégico",pm:1,cuando:"Fase de movimiento",blanco:"1 unidad EXTERMINADOR, ESC. VET. FÉRREAGUARDIA, ESC. VET. RETAGUARDIA o ESC. VET. VANGUARDIA dentro del alcance de un marcador de objetivo que controlas",efecto:"Ese marcador de objetivo permanece bajo tu control aunque no tengas miniaturas en su alcance, hasta que tu oponente lo controle al final de una fase."},{id:"exterminio-disciplinado",nombre:"Exterminio disciplinado",tipo:"Táctica de batalla",pm:1,cuando:"Fase de disparo",blanco:"1 unidad EXTERMINADOR, ESC. VET. FÉRREAGUARDIA, ESC. VET. RETAGUARDIA o ESC. VET. VANGUARDIA no elegida para disparar en esta fase",efecto:"Hasta el final de la fase: las armas a distancia de tu unidad tienen [IGNORA COBERTURA] y mejoran en 1 su FP."},{id:"extraccion-lanzadera",nombre:"Extracción en lanzadera",tipo:"Táctica de batalla",pm:1,cuando:"Final de la fase de combate del oponente",blanco:"1 unidad de EXTERMINADORES ADEPTUS ASTARTES que no tenga enemigos en su zona de amenaz
